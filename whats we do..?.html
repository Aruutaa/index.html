<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What We Do - Geomatika</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:'Poppins';}

/* NAVBAR */
.navbar{background:#020617;padding:10px;}

/* LAYOUT */
.container-map{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
width:300px;
background:#020617;
padding:20px;
overflow-y:auto;
}

.sidebar-item{
padding:10px;
margin-bottom:10px;
background:rgba(255,255,255,0.05);
border-radius:10px;
cursor:pointer;
}

.sidebar-item:hover{background:#0ea5e9;}

input{margin-bottom:10px;}

/* MAP */
#map{flex:1;}

/* LEGEND */
.legend{
background:#020617;
padding:10px;
border-radius:10px;
line-height:1.6;
}
</style>
</head>

<body>

<nav class="navbar text-white">
<span>What Geomatika Do?</span>
<a href="index.html" class="text-white">⬅ Back</a>
</nav>

<div class="container-map">

<div class="sidebar">
<input type="text" id="search" class="form-control" placeholder="Cari Gedung...">
<div id="list"></div>
</div>

<div id="map"></div>

</div>

<script>

// MAP INIT
var map = L.map('map').setView([-7.76,110.41],16);

// BASEMAP
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var satelit = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

osm.addTo(map);

// LAYER GROUP
var layers = {
"FTI": L.layerGroup(),
"FTM": L.layerGroup(),
"FISIP": L.layerGroup()
};

// GEOJSON LOAD
fetch('assets/geojson/kampus_upn.geojson')
.then(res=>res.json())
.then(data=>{

data.features.forEach(f=>{

let nama = f.properties.nama;
let fakultas = f.properties.fakultas || "Lainnya";
let jurusan = f.properties.jurusan || "-";

let layer = L.geoJSON(f,{
style:{color:'#0ea5e9',weight:2,fillOpacity:0.4}
});

layer.eachLayer(l=>{
l.bindPopup(`<b>${nama}</b><br>${fakultas}<br>${jurusan}`);

// HOVER EFFECT
l.on('mouseover',()=>l.setStyle({color:'#22c55e'}));
l.on('mouseout',()=>l.setStyle({color:'#0ea5e9'}));

// SIDEBAR
let item = document.createElement('div');
item.className="sidebar-item";
item.innerText=nama;

item.onclick=()=>{
map.fitBounds(l.getBounds());
l.openPopup();
};

document.getElementById('list').appendChild(item);

// GROUP BY FAKULTAS
if(!layers[fakultas]){
layers[fakultas]=L.layerGroup();
}
layers[fakultas].addLayer(l);

});

});

// ADD TO MAP
Object.values(layers).forEach(l=>l.addTo(map));

});

// LAYER CONTROL
L.control.layers({
"OSM":osm,
"Satelit":satelit
}, layers).addTo(map);

// SEARCH
document.getElementById('search').addEventListener('keyup',function(){
let val=this.value.toLowerCase();
document.querySelectorAll('.sidebar-item').forEach(i=>{
i.style.display = i.innerText.toLowerCase().includes(val) ? 'block':'none';
});
});

// LEGEND
var legend = L.control({position:'bottomright'});
legend.onAdd=function(){
var div = L.DomUtil.create('div','legend');
div.innerHTML = `
<b>Legenda</b><br>
🔵 Gedung<br>
🟢 Hover Aktif
`;
return div;
};
legend.addTo(map);

</script>

</body>
</html>
