<!DOCTYPE html>
<html lang="id">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
font-family:'Poppins', sans-serif;
background:#0f172a;
color:white;
}

.navbar{
background:rgba(15,23,42,0.8);
backdrop-filter: blur(10px);
}

.nav-link{
color:white !important;
margin:0 10px;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
url('assets/img/SRG.png');
background-size:cover;
}

.hero h1{
font-size:64px;
font-weight:700;
}

.btn-glow{
background:#0ea5e9;
border:none;
padding:12px 30px;
border-radius:30px;
box-shadow:0 0 20px rgba(14,165,233,0.6);
}

.card-modern{
background:rgba(255,255,255,0.05);
border:none;
border-radius:20px;
padding:20px;
backdrop-filter: blur(10px);
transition:0.3s;
}

.card-modern:hover{
transform:translateY(-10px);
}

#map{
height:500px;
border-radius:20px;
}

.section{
padding:80px 0;
}

footer{
background:#020617;
padding:30px;
text-align:center;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
<a class="navbar-brand text-white fw-bold">WebGIS Leaflet</a>
<div class="collapse navbar-collapse">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="kbk.html">KBK</a></li>
<li class="nav-item"><a class="nav-link" href="#map-section">Map</a></li>
<li class="nav-item"><a class="nav-link" href="#galeri">Galeri</a></li>
</ul>
</div>
</div>
</nav>

<section class="hero">
<div>
<h1>SALAM KOORDINAT</h1>
<p>Geomatika Petakan Dunia</p>
<a href="#map-section" class="btn btn-glow mt-3">Jelajahi</a>
</div>
</section>

<section class="section container" id="kbk">
<h2 class="text-center mb-5">Bidang Keahlian</h2>
<div class="row g-4">
<div class="col-md-3"><div class="card-modern text-center"><h5>SIG</h5></div></div>
<div class="col-md-3"><div class="card-modern text-center"><h5>Terestris</h5></div></div>
<div class="col-md-3"><div class="card-modern text-center"><h5>Hidrologi</h5></div></div>
<div class="col-md-3"><div class="card-modern text-center"><h5>Remote Sensing</h5></div></div>
</div>
</section>

<section class="section container" id="map-section">
<h2 class="text-center mb-4"></h2>
<div id="map">~where we are..</div>
</section>

<section class="section container" id="galeri">
<h2 class="text-center mb-4">Galeri</h2>
<div class="row g-4">
<div class="col-md-4"><img src="assets/img/SRG.png" class="img-fluid rounded"></div>
<div class="col-md-4"><img src="assets/img/GG.png" class="img-fluid rounded"></div>
<div class="col-md-4"><img src="assets/img/SGG.png" class="img-fluid rounded"></div>
</div>
</section>

<footer>
<p>© 2026 Dendi Duandiarta | Kink 🔥</p>
</footer>

<script>

// INIT MAP
var map = L.map('map').setView([-7.8, 110.36], 13);

// BASEMAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// LOAD GEOJSON
fetch('assets/geojson/asrama_putra.geojson')
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        style: {
            color: '#38bdf8',
            weight: 2,
            fillOpacity: 0.5
        },
        onEachFeature: function(feature, layer){
            layer.bindPopup("<b>Bangunan</b><br>Info lokasi");
        }
    }).addTo(map);
});

</script>

</body>
</html>
