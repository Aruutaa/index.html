<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebGIS Fasilitas Kesehatan Purworejo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f1f5f9;
}

/* NAVBAR */

.navbar{
z-index:1000;
}

/* SIDEBAR */

#sidebar{

position:absolute;
top:60px;
left:0;
bottom:0;

width:360px;

background:white;

padding:25px;

box-shadow:4px 0 12px rgba(0,0,0,0.15);

overflow:auto;

z-index:1000;

}

/* MAP */

#map{
position:absolute;
top:60px;
bottom:0;
left:360px;
right:0;
}

/* INFO PANEL */

#infoPanel{

position:absolute;
top:80px;
right:20px;

width:280px;

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 3px 10px rgba(0,0,0,0.2);

z-index:999;

}

/* ANALYSIS PANEL */

#analysisPanel{

position:absolute;

bottom:0;
left:360px;
right:0;

height:120px;

background:#0f172a;

color:white;

padding:20px;

font-size:14px;

}

.legend-dot{
font-size:18px;
margin-right:6px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" href="index.html">
WebGIS Fasilitas Kesehatan
</a>

</div>

</nav>

<!-- SIDEBAR -->

<div id="sidebar">
  <hr>

<h5>Layer Fasilitas Kesehatan</h5>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="layerRS" checked>
<label class="form-check-label">Rumah Sakit</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="layerPuskesmas" checked>
<label class="form-check-label">Puskesmas</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="layerKlinik" checked>
<label class="form-check-label">Klinik</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="layerApotek" checked>
<label class="form-check-label">Apotek</label>
</div>

<h4>Navigasi</h4>

<div class="mb-3">

<label>Pencarian Lokasi</label>

<div id="searchBox"></div>

</div>

<hr>

<div class="mb-2">

<label>Titik A (Awal)</label>

<input id="startPoint" class="form-control" placeholder="Klik peta">

</div>

<div class="mb-2">

<label>Titik B (Tujuan)</label>

<input id="endPoint" class="form-control" placeholder="Klik peta">

</div>

<div class="mb-2">

<label>Mode Transportasi</label>

<select id="modeTravel" class="form-control">

<option value="driving">Mobil</option>
<option value="walking">Pejalan Kaki</option>

</select>

</div>

<div class="d-flex gap-2 mt-3">

<button id="btnRoute" class="btn btn-primary w-50">
Buat Rute
</button>

<button id="resetRoute" class="btn btn-danger w-50">
Reset
</button>

</div>

</div>

<!-- INFO -->

<div id="infoPanel">

<h5>Informasi Fasilitas</h5>

<div id="infoContent">
Klik titik fasilitas kesehatan
</div>

</div>

<!-- ANALYSIS -->

<div id="analysisPanel">

<b>Analisis Jarak</b><br>
Klik marker fasilitas kesehatan untuk melihat jarak.

<hr style="border-color:rgba(255,255,255,0.2)">

<b>Legenda</b><br>

<span class="legend-dot" style="color:red">●</span> Rumah Sakit
&nbsp;&nbsp;
<span class="legend-dot" style="color:green">●</span> Puskesmas
&nbsp;&nbsp;
<span class="legend-dot" style="color:orange">●</span> Klinik
&nbsp;&nbsp;
<span class="legend-dot" style="color:purple">●</span> Apotek

</div>

<div id="map"></div>

<script>

/* MAP */

var map=L.map('map',{zoomControl:false}).setView([-7.72,110.02],11);

L.control.zoom({position:'bottomright'}).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

/* SEARCH */

var geocoder=L.Control.geocoder({
defaultMarkGeocode:true
});

geocoder.addTo(map);

document.getElementById("searchBox")
.appendChild(geocoder.onAdd(map));

/* USER LOCATION */

var userMarker;

map.locate({setView:false});

map.on('locationfound',function(e){

userMarker=L.marker(e.latlng)
.addTo(map)
.bindPopup("Lokasi Anda");

});

/* ROUTING */

var routingControl;

var startLatLng=null;
var endLatLng=null;

map.on('click',function(e){

if(!startLatLng){

startLatLng=e.latlng;

document.getElementById("startPoint").value=
e.latlng.lat.toFixed(5)+","+e.latlng.lng.toFixed(5);

}

else if(!endLatLng){

endLatLng=e.latlng;

document.getElementById("endPoint").value=
e.latlng.lat.toFixed(5)+","+e.latlng.lng.toFixed(5);

}

});

document.getElementById("btnRoute").onclick=function(){

if(!startLatLng||!endLatLng){

alert("Tentukan titik A dan B");

return;

}

var mode=document.getElementById("modeTravel").value;

if(routingControl){
map.removeControl(routingControl);
}

routingControl=L.Routing.control({

waypoints:[
startLatLng,
endLatLng
],

router:L.Routing.osrmv1({
profile:mode
}),

routeWhileDragging:false

}).addTo(map);

};

document.getElementById("resetRoute").onclick=function(){

if(routingControl){
map.removeControl(routingControl);
}

startLatLng=null;
endLatLng=null;

document.getElementById("startPoint").value="";
document.getElementById("endPoint").value="";

};

/* DISTANCE */

function getDistance(lat1,lon1,lat2,lon2){

var R=6371;

var dLat=(lat2-lat1)*Math.PI/180;
var dLon=(lon2-lon1)*Math.PI/180;

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

// LAYER GROUP
var rsLayer = L.layerGroup().addTo(map);
var puskesmasLayer = L.layerGroup().addTo(map);
var klinikLayer = L.layerGroup().addTo(map);
var apotekLayer = L.layerGroup().addTo(map);
/* DATA */

var style = {
radius:7,
fillColor:color,
color:"#fff",
weight:1,
fillOpacity:0.9
};

var marker;

if(jenis=="Rumah Sakit"){
marker = L.circleMarker([lat,lon],style).addTo(rsLayer);
}

else if(jenis=="Puskesmas"){
marker = L.circleMarker([lat,lon],style).addTo(puskesmasLayer);
}

else if(jenis=="Klinik"){
marker = L.circleMarker([lat,lon],style).addTo(klinikLayer);
}

else if(jenis=="Apotek"){
marker = L.circleMarker([lat,lon],style).addTo(apotekLayer);
})

.then(res=>res.json())
// TOGGLE LAYER

document.getElementById("layerRS").onchange = function(){
if(this.checked){ map.addLayer(rsLayer); }
else{ map.removeLayer(rsLayer); }
};

document.getElementById("layerPuskesmas").onchange = function(){
if(this.checked){ map.addLayer(puskesmasLayer); }
else{ map.removeLayer(puskesmasLayer); }
};

document.getElementById("layerKlinik").onchange = function(){
if(this.checked){ map.addLayer(klinikLayer); }
else{ map.removeLayer(klinikLayer); }
};

document.getElementById("layerApotek").onchange = function(){
if(this.checked){ map.addLayer(apotekLayer); }
else{ map.removeLayer(apotekLayer); }
};
  
.then(data=>{

data.features.forEach(function(feature){

var lat=feature.geometry.coordinates[1];
var lon=feature.geometry.coordinates[0];

var jenis=feature.properties.jenis_faskes;

var color="blue";

if(jenis=="Rumah Sakit"){color="red";}
if(jenis=="Puskesmas"){color="green";}
if(jenis=="Klinik"){color="orange";}
if(jenis=="Apotek"){color="purple";}

var marker=L.circleMarker([lat,lon],{

radius:7,
fillColor:color,
color:"#fff",
weight:1,
fillOpacity:0.9

}).addTo(map);

marker.on('click',function(){

document.getElementById("infoContent").innerHTML=

"<b>"+feature.properties.nama_faskes+"</b><br>"+
"Jenis : "+jenis+"<br>"+
"Kecamatan : "+feature.properties.kecamatan+"<br>"+
"Alamat : "+feature.properties.alamat;

if(userMarker){

var user=userMarker.getLatLng();

var dist=getDistance(user.lat,user.lng,lat,lon);

document.getElementById("analysisPanel").innerHTML=

"<b>Analisis Jarak</b><br>"+
"Jarak dari lokasi Anda ke <b>"+feature.properties.nama_faskes+
"</b> sekitar <b>"+dist.toFixed(2)+" km</b><hr>"+
"<b>Legenda</b><br>"+
"<span style='color:red'>●</span> Rumah Sakit "+
"<span style='color:green'>●</span> Puskesmas "+
"<span style='color:orange'>●</span> Klinik "+
"<span style='color:purple'>●</span> Apotek";

}

});

});

});

</script>

</body>

</html>
```
