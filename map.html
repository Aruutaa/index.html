<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WebGIS Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

/* SIDEBAR */

#sidebar{
position:absolute;
top:10px;
left:10px;
background:white;
padding:15px;
border-radius:10px;
z-index:1000;
}

.legend{
background:white;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div id="sidebar">

<b>Layer</b><br>

<input type="checkbox" id="rs" checked> Rumah Sakit<br>
<input type="checkbox" id="puskesmas" checked> Puskesmas<br>
<input type="checkbox" id="klinik" checked> Klinik<br>
<input type="checkbox" id="apotek" checked> Apotek

</div>

<div id="map"></div>

<script>

// INIT MAP
var map = L.map('map',{
zoomControl:false
}).setView([-7.72,110.02],11);


// ZOOM CONTROL
L.control.zoom({
position:'bottomright'
}).addTo(map);


// BASEMAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);


// ICON
var rsIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/2967/2967350.png',
iconSize:[30,30]
});

var puskesmasIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/684/684908.png',
iconSize:[30,30]
});

var klinikIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/1484/1484916.png',
iconSize:[30,30]
});

var apotekIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/2921/2921822.png',
iconSize:[30,30]
});


// LAYER
var rsLayer = L.layerGroup().addTo(map);
var puskesmasLayer = L.layerGroup().addTo(map);
var klinikLayer = L.layerGroup().addTo(map);
var apotekLayer = L.layerGroup().addTo(map);


// LOAD GEOJSON
fetch('assets/geojson/faskes_purworejo.geojson')

.then(res => res.json())

.then(data => {

data.features.forEach(function(feature){

var lat = feature.geometry.coordinates[1];
var lon = feature.geometry.coordinates[0];

var jenis = feature.properties.jenis;

var marker;

if(jenis=="Rumah Sakit"){
marker = L.marker([lat,lon],{icon:rsIcon}).addTo(rsLayer);
}

else if(jenis=="Puskesmas"){
marker = L.marker([lat,lon],{icon:puskesmasIcon}).addTo(puskesmasLayer);
}

else if(jenis=="Klinik"){
marker = L.marker([lat,lon],{icon:klinikIcon}).addTo(klinikLayer);
}

else if(jenis=="Apotek"){
marker = L.marker([lat,lon],{icon:apotekIcon}).addTo(apotekLayer);
}

marker.bindPopup(
"<b>"+feature.properties.nama+"</b><br>"+
"Jenis: "+feature.properties.jenis+"<br>"+
"Kecamatan: "+feature.properties.kecamatan
);

});

});


// CHECKBOX CONTROL
document.getElementById("rs").onchange = function(){
this.checked ? map.addLayer(rsLayer) : map.removeLayer(rsLayer);
};

document.getElementById("puskesmas").onchange = function(){
this.checked ? map.addLayer(puskesmasLayer) : map.removeLayer(puskesmasLayer);
};

document.getElementById("klinik").onchange = function(){
this.checked ? map.addLayer(klinikLayer) : map.removeLayer(klinikLayer);
};

document.getElementById("apotek").onchange = function(){
this.checked ? map.addLayer(apotekLayer) : map.removeLayer(apotekLayer);
};


// LEGEND
var legend = L.control({position:'bottomleft'});

legend.onAdd = function(){

var div = L.DomUtil.create('div','legend');

div.innerHTML =
"<b>Legenda</b><br>"+
"🏥 Rumah Sakit<br>"+
"🏪 Puskesmas<br>"+
"💊 Klinik<br>"+
"🧴 Apotek";

return div;

};

legend.addTo(map);

</script>

</body>

</html>
