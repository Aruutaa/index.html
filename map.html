<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WebGIS Fasilitas Kesehatan</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
}

/* NAVBAR */

.navbar{
z-index:1000;
}

/* MAP */

#map{
position:absolute;
top:60px;
bottom:0;
left:0;
right:0;
}

/* SIDEBAR ROUTE */

#routePanel{

position:absolute;
top:80px;
left:10px;

width:280px;

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.3);

z-index:999;

}

/* PANEL ATRIBUT */

#infoPanel{

position:absolute;

top:80px;
right:10px;

width:300px;

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.3);

z-index:999;

}

/* ANALYSIS PANEL */

#analysisPanel{

position:absolute;

bottom:0;
left:0;
right:0;

height:120px;

background:rgba(0,0,0,0.7);

color:white;

padding:15px;

z-index:999;

}

/* LEGEND */

.legend{

background:white;

padding:10px;

border-radius:10px;

line-height:1.5;

box-shadow:0 0 6px rgba(0,0,0,0.3);

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" href="index.html">WebGIS Faskes Purworejo</a>

</div>

</nav>

<!-- ROUTE PANEL -->

<div id="routePanel">

<h5>Rute Fasilitas Kesehatan</h5>

<label>Tujuan</label>

<select id="destinationSelect" class="form-control mb-2">
<option value="">Pilih fasilitas kesehatan</option>
</select>

<button id="btnRoute" class="btn btn-primary w-100">
Buat Rute
</button>

</div>

<!-- INFO PANEL -->

<div id="infoPanel">

<h5>Informasi Fasilitas</h5>

<div id="infoContent">

Klik titik fasilitas kesehatan

</div>

</div>

<!-- ANALYSIS -->

<div id="analysisPanel">

Analisis jarak fasilitas kesehatan dari lokasi Anda

</div>

<div id="map"></div>

<script>

/* INIT MAP */

var map = L.map('map',{zoomControl:false}).setView([-7.72,110.02],11);

/* ZOOM CONTROL */

L.control.zoom({
position:'bottomright'
}).addTo(map);

/* BASEMAP */

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);


/* ICON */

var rsIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/2967/2967350.png',
iconSize:[30,30]
});

var puskesmasIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/684/684908.png',
iconSize:[30,30]
});

var klinikIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/1484/1484916.png',
iconSize:[30,30]
});

var apotekIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/2921/2921822.png',
iconSize:[30,30]
});


/* LAYER */

var rsLayer = L.layerGroup().addTo(map);
var puskesmasLayer = L.layerGroup().addTo(map);
var klinikLayer = L.layerGroup().addTo(map);
var apotekLayer = L.layerGroup().addTo(map);


/* USER LOCATION */

var userMarker;

map.locate({setView:false});

map.on('locationfound',function(e){

userMarker = L.marker(e.latlng)
.addTo(map)
.bindPopup("Lokasi Anda");

});


/* DISTANCE FUNCTION */

function getDistance(lat1,lon1,lat2,lon2){

var R=6371;

var dLat=(lat2-lat1)*Math.PI/180;
var dLon=(lon2-lon1)*Math.PI/180;

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}


/* LOAD DATA */

fetch('assets/geojson/faskes.geojson')

.then(res=>res.json())

.then(data=>{

data.features.forEach(function(feature){

var lat = feature.geometry.coordinates[1];
var lon = feature.geometry.coordinates[0];

var nama = feature.properties.nama_faskes;
var jenis = feature.properties.jenis_faskes;

var marker;

if(jenis=="Rumah Sakit"){
marker = L.marker([lat,lon],{icon:rsIcon}).addTo(rsLayer);
}

else if(jenis=="Puskesmas"){
marker = L.marker([lat,lon],{icon:puskesmasIcon}).addTo(puskesmasLayer);
}

else if(jenis=="Klinik"){
marker = L.marker([lat,lon],{icon:klinikIcon}).addTo(klinikLayer);
}

else if(jenis=="Apotek"){
marker = L.marker([lat,lon],{icon:apotekIcon}).addTo(apotekLayer);
}

/* ADD TO DROPDOWN */

var option=document.createElement("option");

option.value=lat+","+lon;

option.text=nama;

document.getElementById("destinationSelect").appendChild(option);


/* CLICK EVENT */

marker.on('click',function(){

document.getElementById("infoContent").innerHTML=

"<b>"+nama+"</b><br>"+
"Jenis: "+jenis+"<br>"+
"Kecamatan: "+feature.properties.kecamatan+"<br>"+
"Alamat: "+feature.properties.alamat;

if(userMarker){

var user=userMarker.getLatLng();

var distance=getDistance(user.lat,user.lng,lat,lon);

document.getElementById("analysisPanel").innerHTML=

"Jarak dari lokasi Anda ke <b>"+nama+"</b> adalah <b>"+distance.toFixed(2)+" km</b>";

}

});

});

});


/* ROUTING */

var routingControl;

document.getElementById("btnRoute").onclick=function(){

if(!userMarker){

alert("Lokasi Anda belum terdeteksi");

return;

}

var dest=document.getElementById("destinationSelect").value;

if(dest==""){

alert("Pilih tujuan dulu");

return;

}

var coord=dest.split(",");

var lat=parseFloat(coord[0]);
var lon=parseFloat(coord[1]);

if(routingControl){

map.removeControl(routingControl);

}

routingControl=L.Routing.control({

waypoints:[
userMarker.getLatLng(),
L.latLng(lat,lon)
],

routeWhileDragging:false

}).addTo(map);

};


/* LEGEND */

var legend=L.control({position:'bottomleft'});

legend.onAdd=function(){

var div=L.DomUtil.create('div','legend');

div.innerHTML=

"<b>Legenda</b><br><br>"+

"<img src='https://cdn-icons-png.flaticon.com/512/2967/2967350.png' width='18'> Rumah Sakit<br>"+

"<img src='https://cdn-icons-png.flaticon.com/512/684/684908.png' width='18'> Puskesmas<br>"+

"<img src='https://cdn-icons-png.flaticon.com/512/1484/1484916.png' width='18'> Klinik<br>"+

"<img src='https://cdn-icons-png.flaticon.com/512/2921/2921822.png' width='18'> Apotek";

return div;

};

legend.addTo(map);

</script>

</body>

</html>
