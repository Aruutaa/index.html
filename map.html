<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WebGIS Fasilitas Kesehatan</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

<script>

// INIT MAP
var map = L.map('map',{
zoomControl:false
}).setView([-7.72,110.02],11);


// ZOOM CONTROL DI KANAN BAWAH
L.control.zoom({
position:'bottomright'
}).addTo(map);


// BASEMAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);


// ICON MARKER
var rsIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/2967/2967350.png',
iconSize:[32,32]
});

var puskesmasIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/684/684908.png',
iconSize:[30,30]
});

var klinikIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/1484/1484916.png',
iconSize:[30,30]
});

var apotekIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/2921/2921822.png',
iconSize:[28,28]
});


// LAYER GROUP
var rsLayer = L.layerGroup();
var puskesmasLayer = L.layerGroup();
var klinikLayer = L.layerGroup();
var apotekLayer = L.layerGroup();


// GEOLOCATION USER
var userMarker;

map.locate({setView:false});

map.on('locationfound',function(e){

userMarker = L.marker(e.latlng)
.addTo(map)
.bindPopup("Lokasi Anda");

});


// LOAD GEOJSON DATA
fetch('assets/geojson/faskes.geojson')
.then(res => res.json())
.then(data => {

data.features.forEach(function(feature){

var lat = feature.geometry.coordinates[1];
var lon = feature.geometry.coordinates[0];

var jenis = feature.properties.jenis_faskes;

var marker;

if(jenis == "Rumah Sakit"){
marker = L.marker([lat,lon],{icon:rsIcon}).addTo(rsLayer);
}

else if(jenis == "Puskesmas"){
marker = L.marker([lat,lon],{icon:puskesmasIcon}).addTo(puskesmasLayer);
}

else if(jenis == "Klinik"){
marker = L.marker([lat,lon],{icon:klinikIcon}).addTo(klinikLayer);
}

else if(jenis == "Apotek"){
marker = L.marker([lat,lon],{icon:apotekIcon}).addTo(apotekLayer);
}


marker.on('click',function(){

document.getElementById("infoContent").innerHTML =

"<h5>"+feature.properties.nama_faskes+"</h5>"+
"<b>Jenis :</b> "+feature.properties.jenis_faskes+"<br>"+
"<b>Kecamatan :</b> "+feature.properties.kecamatan+"<br>"+
"<b>Alamat :</b> "+feature.properties.alamat;

});

});


rsLayer.addTo(map);
puskesmasLayer.addTo(map);
klinikLayer.addTo(map);
apotekLayer.addTo(map);

});


// SIDEBAR CHECKBOX
document.getElementById("rs").onchange = function(){
if(this.checked){ map.addLayer(rsLayer); }
else{ map.removeLayer(rsLayer); }
};

document.getElementById("puskesmas").onchange = function(){
if(this.checked){ map.addLayer(puskesmasLayer); }
else{ map.removeLayer(puskesmasLayer); }
};

document.getElementById("klinik").onchange = function(){
if(this.checked){ map.addLayer(klinikLayer); }
else{ map.removeLayer(klinikLayer); }
};

document.getElementById("apotek").onchange = function(){
if(this.checked){ map.addLayer(apotekLayer); }
else{ map.removeLayer(apotekLayer); }
};


// LEGEND
var legend = L.control({position:'bottomleft'});

legend.onAdd = function(){

var div = L.DomUtil.create('div','legend');

div.innerHTML =
"<b>Legenda</b><br>"+
"🏥 Rumah Sakit<br>"+
"🏪 Puskesmas<br>"+
"💊 Klinik<br>"+
"🧴 Apotek";

return div;

};

legend.addTo(map);

</script>
